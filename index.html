<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>航空 Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin:0; height:100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #map { height:100%; width:100%; }
    .topbar {
      position: absolute; z-index:1000; top:10px; left:10px; right:10px;
      background:rgba(255,255,255,.95); padding:8px 12px; border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.15); display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    }
    .topbar input[type="file"] { max-width:220px; }
    .topbar button, .topbar label, .topbar input[type="text"] {
      border:1px solid #ccc; background:#fff; padding:8px 10px; border-radius:10px; font-size:14px;
    }
    .status { margin-left:auto; font-size:13px; color:#333; }
    .plane-icon {
      width:18px; height:18px; display:flex; align-items:center; justify-content:center;
      font-size:18px; transform-origin:center center; text-shadow:0 0 2px white;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <input id="kmlFile" type="file" accept=".kml,.kmz" />
    <input id="avionReg" type="text" placeholder="Immatriculation (ex: F-HPUJ)" />
    <button id="loadPlaneBtn" class="pill">Charger avion</button>
    <span id="toggleLiveStatus" class="pill">Avion live: ON</span>
    <span class="status" id="status">Prêt</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    const map = L.map('map').setView([43.6047, 1.4442], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let kmlLayer = null;
    let planeLayer = null;
    let planesOn = true;
    let currentReg = 'F-HPUJ'; // valeur par défaut
    const statusEl = document.getElementById('status');

    function setStatus(msg) { statusEl.textContent = msg; }

    function clearKml() { if (kmlLayer) map.removeLayer(kmlLayer); kmlLayer = null; }
    function clearPlane() { if (planeLayer) map.removeLayer(planeLayer); planeLayer = null; }

    function addGeoJsonLayer(geojson) {
      clearKml();
      kmlLayer = L.geoJSON(geojson, {
        style: () => ({ color: '#e11d48', weight: 3, fillColor: '#fb7185', fillOpacity: 0.2 }),
        pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
          radius: 6, color: '#0f172a', weight: 2, fillColor: '#f59e0b', fillOpacity: 1
        }),
        onEachFeature: (f, l) => {
          const p = f.properties || {};
          const txt = p.name || p.description || p.title || 'KML';
          l.bindPopup(txt.replace(/<[^>]+>/g, ''));
        }
      }).addTo(map);
      try { map.fitBounds(kmlLayer.getBounds(), { padding: [20,20] }); } catch (e) {}
      setStatus('KML chargé');
    }

    function parseKmlFile(file) {
      setStatus('Lecture KML...');
      return file.text().then(text => {
        const xml = new DOMParser().parseFromString(text, 'application/xml');
        const geojson = toGeoJSON.kml(xml);
        addGeoJsonLayer(geojson);
      });
    }

    function parseKmzFile(file) {
      setStatus('Lecture KMZ...');
      return file.arrayBuffer().then(buf => JSZip.loadAsync(buf))
        .then(zip => {
          const kmls = Object.keys(zip.files).filter(n => n.toLowerCase().endsWith('.kml'));
          if (!kmls.length) throw new Error('Aucun .kml dans le KMZ');
          return zip.files[kmls[0]].async('string');
        })
        .then(text => {
          const xml = new DOMParser().parseFromString(text, 'application/xml');
          const geojson = toGeoJSON.kml(xml);
          addGeoJsonLayer(geojson);
        });
    }

    document.getElementById('kmlFile').addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const fn = file.name.toLowerCase();
      const promise = fn.endsWith('.kmz') ? parseKmzFile(file) : parseKmlFile(file);
      promise.catch(err => { setStatus('KML/KMZ err'); alert(err); });
    });

    document.getElementById('loadPlaneBtn').addEventListener('click', () => {
      const reg = document.getElementById('avionReg').value.trim();
      if (!reg) {
        setStatus('Immatriculation vide');
        return;
      }
      currentReg = reg;
      setStatus('Avion selectionné: ' + reg);
      loadPlane();
    });

    function addPlane(lat, lon, heading, callsign, reg) {
      const icon = L.divIcon({
        className: '',
        html: `<div class="plane-icon" style="transform: rotate(${heading-90 || 0}deg)">✈</div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });

      if (!planeLayer) {
        planeLayer = L.marker([lat, lon], { icon }).addTo(map);
      } else {
        planeLayer.setLatLng([lat, lon]).setIcon(icon);
      }

      planeLayer.bindPopup(
        `<b>${callsign || 'Avion'}</b> (${reg})<br>${lat.toFixed(4)}, ${lon.toFixed(4)}`
      );
    }

    async function loadPlane() {
      if (!planesOn) return;
      setStatus('Avion en direct...');
      try {
        const url = `https://mon-tracking.onrender.com/avion?reg=${encodeURIComponent(currentReg)}`;
        const res = await fetch(url, { cache: 'no-store' });
        const data = await res.json();

        if (data.error || data.lat == null || data.lon == null) {
          setStatus('Avion hors ligne');
          return;
        }

        addPlane(data.lat, data.lon, data.heading, data.callsign, data.reg);
        setStatus(`Avion (${data.reg}) chargé`);
      } catch (e) {
        console.error('loadPlane:', e);
        setStatus('Avion indisponible');
      }
    }

    // Rafraîchissement toutes les 5 secondes, toujours ON
    planesOn = true;
    setInterval(() => {
      if (planesOn) loadPlane();
    }, 5000);

    // Au démarrage, affiche un message d’aide
    setStatus('Entrez l’immatriculation puis cliquez sur "Charger avion"');
  </script>
</body>
</html>
